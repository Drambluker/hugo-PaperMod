<div id="cookie-notice" class="post-banner">
    <p>Пользуясь сайтом, вы соглашаетесь с <a href="/privacy">политикой конфиденциальности</a> и тем, что мы используем куки-файлы</p>
    <button id="cookie-notice-accept">{{- i18n "okay" | default "Okay" }}</button>
    <!--button id="cookie-notice-deny">Deny</button-->
</div>
<script>
    function createCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + value + expires + "; path=/" + ";secure;SameSite=None";
    }

    function readCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for (var i=0; i < ca.length; i++) {
            var c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

    function deleteCookiesByPattern(pattern) {
        const cookies = document.cookie.split(';');

        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i];
            const eqPos = cookie.indexOf("=");
            const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;

            if (name.includes(pattern)) {
                document.cookie = name + "=; Domain=.itdoxy.com; Path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; secure; SameSite=None";
            }
        }
    }

    if (readCookie('cookie-notice-option') == 'true') {
        {{ if hugo.IsProduction | or (eq .Site.Params.env "production") }}

        function loadScriptAsync(scriptSrc, callback) {
            if (typeof callback !== 'function') {
                throw new Error('Not a valid callback for async script load');
            }
            var script = document.createElement('script');
            script.onload = callback;
            script.src = scriptSrc;
            document.head.appendChild(script);
        }

        /* This is the part where you call the above defined function and "calls back"
        your code which gets executed after the script has loaded */
        {{- partial "extend_cookie_consent.js" . }}

        {{ end }}
    } else if (readCookie('cookie-notice-option') != 'false') {
        deleteCookiesByPattern("_ga");
        document.getElementById('cookie-notice').style.display = 'flex';
    } else if (readCookie('cookie-notice-option') == 'false'){
        deleteCookiesByPattern("_ga");
        document.getElementById('cookie-notice').style.display = 'none';
    }

    document.getElementById('cookie-notice-accept').addEventListener("click", function() {
        createCookie('cookie-notice-option', 'true', 31);
        document.getElementById('cookie-notice').style.display = 'none';
        location.reload();
    });

    /*document.getElementById('cookie-notice-deny').addEventListener("click", function() {
        createCookie('cookie-notice-option', 'false', 31);
        document.getElementById('cookie-notice').style.display = 'none';
        location.reload();
    });*/
</script>
